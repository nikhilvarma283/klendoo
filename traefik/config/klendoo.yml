http:
  routers:
    klendoo-http:
      rule: "Host(`klendoo.com`) || Host(`www.klendoo.com`)"
      entrypoints:
        - web
      service: dummy
      middlewares:
        - redirect-https
    
    klendoo-https:
      rule: "Host(`klendoo.com`) || Host(`www.klendoo.com`)"
      entrypoints:
        - websecure
      service: klendoo-backend
      tls:
        certResolver: letsencrypt

  services:
    dummy:
      loadBalancer:
        servers:
          - url: "http://localhost"
    
    klendoo-backend:
      loadBalancer:
        servers:
          - url: "http://klendoo-web:3000"

  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true
